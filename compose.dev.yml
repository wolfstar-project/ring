services:
  postgres:
    container_name: ring-postgres
    image: "postgres:15-alpine"
    ports:
      - "5432:5432"
    restart: "no"
    volumes:
      - "ring-postgres-data:/var/lib/postgresql/data"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ring
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 80s

volumes:
  ring-postgres-data:
